basePath: /campaign-center-api/v1
definitions:
  api.CreateCampaignReq:
    properties:
      campaignEndTime:
        type: string
      campaignStartTime:
        type: string
      landingPageId:
        type: integer
      name:
        type: string
      registrationEndTime:
        type: string
      registrationStartTime:
        type: string
      rewardRules:
        $ref: '#/definitions/api.RewardRulesReq'
      targetMarket:
        type: string
      targetUserSegment:
        type: string
      type:
        type: string
    required:
    - campaignEndTime
    - campaignStartTime
    - name
    - registrationEndTime
    - registrationStartTime
    - rewardRules
    - targetMarket
    - targetUserSegment
    - type
    type: object
  api.GenerateLandingTranslationData:
    properties:
      description:
        type: string
      lang:
        example: ja
        type: string
      terms:
        type: string
      title:
        type: string
    type: object
  api.GenerateLandingTranslationHTTPResponse:
    properties:
      code:
        example: 0
        type: integer
      data:
        $ref: '#/definitions/api.GenerateLandingTranslationData'
      message:
        example: success
        type: string
    type: object
  api.GenerateLandingTranslationReq:
    properties:
      description:
        example: Recharge now and receive <reward_amount> bonus
        type: string
      sourceLang:
        example: en
        type: string
      targetLang:
        example: ja
        type: string
      terms:
        example: Reward will expire in <days> days
        type: string
      title:
        example: Top up <amount> to get reward
        type: string
    required:
    - sourceLang
    - targetLang
    type: object
  api.LandingPageBody:
    properties:
      bannerImageUrl:
        type: string
      defaultLang:
        type: string
      description:
        type: string
      terms:
        type: string
      title:
        type: string
    required:
    - bannerImageUrl
    - defaultLang
    - description
    - terms
    - title
    type: object
  api.LandingPageLocaleDetailData:
    properties:
      bannerImageUrl:
        type: string
      createdAt:
        type: string
      defaultLang:
        example: en
        type: string
      description:
        type: string
      id:
        example: 2001
        type: integer
      lang:
        example: ja
        type: string
      status:
        type: integer
      terms:
        type: string
      title:
        type: string
      updatedAt:
        type: string
    type: object
  api.LandingPageLocaleDetailHTTPResponse:
    properties:
      code:
        example: 0
        type: integer
      data:
        $ref: '#/definitions/api.LandingPageLocaleDetailData'
      message:
        example: success
        type: string
    type: object
  api.LandingPageTranslatedLangsData:
    properties:
      langs:
        items:
          type: string
        type: array
    type: object
  api.LandingPageTranslatedLangsHTTPResponse:
    properties:
      code:
        example: 0
        type: integer
      data:
        $ref: '#/definitions/api.LandingPageTranslatedLangsData'
      message:
        example: success
        type: string
    type: object
  api.PublishOperatorReq:
    properties:
      operator:
        type: string
    required:
    - operator
    type: object
  api.PutLandingTranslationData:
    properties:
      landingPageId:
        type: integer
      lang:
        type: string
    type: object
  api.PutLandingTranslationHTTPResponse:
    properties:
      code:
        example: 0
        type: integer
      data:
        $ref: '#/definitions/api.PutLandingTranslationData'
      message:
        example: success
        type: string
    type: object
  api.PutLandingTranslationReq:
    properties:
      description:
        type: string
      operator:
        example: admin
        type: string
      terms:
        type: string
      title:
        type: string
    required:
    - description
    - terms
    - title
    type: object
  api.RewardRulesReq:
    properties:
      maxClaimPerUser:
        type: integer
      rewardAmount:
        type: number
      rewardType:
        type: string
      topupThreshold:
        type: number
    required:
    - maxClaimPerUser
    - rewardAmount
    - rewardType
    - topupThreshold
    type: object
  api.SimulateTopUpReq:
    properties:
      amount:
        type: number
    required:
    - amount
    type: object
  api.UpdateCampaignReq:
    properties:
      campaignEndTime:
        type: string
      campaignStartTime:
        type: string
      landingPageId:
        type: integer
      name:
        type: string
      registrationEndTime:
        type: string
      registrationStartTime:
        type: string
      rewardRules:
        $ref: '#/definitions/api.RewardRulesReq'
      targetMarket:
        type: string
      targetUserSegment:
        type: string
    required:
    - campaignEndTime
    - campaignStartTime
    - name
    - registrationEndTime
    - registrationStartTime
    - rewardRules
    - targetMarket
    - targetUserSegment
    type: object
  api.UserProfileData:
    properties:
      email:
        example: a***e@example.com
        type: string
      kycChecked:
        example: true
        type: boolean
      registeredAt:
        example: "2026-05-16T10:00:00Z"
        type: string
      username:
        example: alice
        type: string
    type: object
  api.UserProfileHTTPResponse:
    properties:
      code:
        example: 0
        type: integer
      data:
        $ref: '#/definitions/api.UserProfileData'
      message:
        example: success
        type: string
    type: object
  data.StandardResponse:
    properties:
      code:
        example: 0
        type: integer
      data: {}
      message:
        example: success
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: API Support
  description: HTTP API for Phase 1 user top-up campaigns (admin + user-facing). Operates
    under `/campaign-center-api/v1`;
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Campaign Center API
  version: "1.0"
paths:
  /admin/campaigns:
    get:
      parameters:
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: pageSize
        type: integer
      - description: Campaign status filter
        in: query
        name: status
        type: integer
      - description: Campaign type e.g. TOPUP_REWARD
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: List campaigns (admin)
      tags:
      - admin-campaign
    post:
      consumes:
      - application/json
      parameters:
      - description: Campaign payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateCampaignReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "400":
          description: validation error
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Create campaign (admin)
      tags:
      - admin-campaign
  /admin/campaigns/{campaignId}:
    get:
      parameters:
      - description: Campaign ID
        in: path
        name: campaignId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Get campaign detail (admin)
      tags:
      - admin-campaign
    put:
      consumes:
      - application/json
      parameters:
      - description: Campaign ID
        in: path
        name: campaignId
        required: true
        type: integer
      - description: Campaign payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.UpdateCampaignReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "409":
          description: not draft
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Update campaign (admin)
      tags:
      - admin-campaign
  /admin/campaigns/{campaignId}/archive:
    post:
      consumes:
      - application/json
      parameters:
      - description: Campaign ID
        in: path
        name: campaignId
        required: true
        type: integer
      - description: Operator
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.PublishOperatorReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "409":
          description: not eligible or already archived
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Archive campaign (admin)
      tags:
      - admin-campaign
  /admin/campaigns/{campaignId}/participations:
    get:
      parameters:
      - description: Campaign ID
        in: path
        name: campaignId
        required: true
        type: integer
      - description: Page (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20)
        in: query
        name: pageSize
        type: integer
      - description: Filter by user ID
        in: query
        name: userId
        type: integer
      - description: Filter by reward status e.g. GRANTED
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "404":
          description: campaign not found
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: List campaign participations (admin)
      tags:
      - admin-campaign-performance
  /admin/campaigns/{campaignId}/performance/daily:
    get:
      parameters:
      - description: Campaign ID
        in: path
        name: campaignId
        required: true
        type: integer
      - description: Start date YYYY-MM-DD
        in: query
        name: startDate
        required: true
        type: string
      - description: End date YYYY-MM-DD
        in: query
        name: endDate
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "404":
          description: campaign not found
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: List campaign daily performance (admin)
      tags:
      - admin-campaign-performance
  /admin/campaigns/{campaignId}/performance/summary:
    get:
      parameters:
      - description: Campaign ID
        in: path
        name: campaignId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "404":
          description: campaign not found
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Get campaign performance summary (admin)
      tags:
      - admin-campaign-performance
  /admin/campaigns/{campaignId}/publish:
    post:
      consumes:
      - application/json
      parameters:
      - description: Campaign ID
        in: path
        name: campaignId
        required: true
        type: integer
      - description: Operator
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.PublishOperatorReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Publish campaign (admin)
      tags:
      - admin-campaign
  /admin/landing-pages:
    get:
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: pageSize
        type: integer
      - description: Status filter
        in: query
        name: status
        type: integer
      - description: Default language filter e.g. en
        in: query
        name: defaultLang
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: List landing pages (admin)
      tags:
      - admin-landing-page
    post:
      consumes:
      - application/json
      parameters:
      - description: Landing page content
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.LandingPageBody'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "400":
          description: validation error
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Create landing page (admin)
      tags:
      - admin-landing-page
  /admin/landing-pages/{landingPageId}:
    get:
      parameters:
      - description: Landing page ID
        in: path
        name: landingPageId
        required: true
        type: integer
      - description: Requested language (falls back to default)
        in: query
        name: lang
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Get landing page (admin)
      tags:
      - admin-landing-page
    put:
      consumes:
      - application/json
      parameters:
      - description: Landing page ID
        in: path
        name: landingPageId
        required: true
        type: integer
      - description: Landing page content
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.LandingPageBody'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "409":
          description: not draft
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Update landing page (admin)
      tags:
      - admin-landing-page
  /admin/landing-pages/{landingPageId}/detail/{lang}:
    get:
      description: title/description/terms come from campaign_landing_page_translations
        when a row exists for lang; otherwise from campaign_landing_pages. bannerImageUrl,
        status, timestamps always from campaign_landing_pages.
      parameters:
      - description: Landing page ID
        in: path
        name: landingPageId
        required: true
        type: integer
      - description: Locale tag, e.g. ja, zh-CN
        in: path
        name: lang
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/api.LandingPageLocaleDetailHTTPResponse'
        "400":
          description: invalid path
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Get landing page detail by locale (admin)
      tags:
      - admin-landing-page
  /admin/landing-pages/{landingPageId}/publish:
    post:
      consumes:
      - application/json
      parameters:
      - description: Landing page ID
        in: path
        name: landingPageId
        required: true
        type: integer
      - description: Operator
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.PublishOperatorReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Publish landing page (admin)
      tags:
      - admin-landing-page
  /admin/landing-pages/{landingPageId}/translations:
    get:
      description: Distinct lang values from the translation table only (excludes
        default_lang unless a translation row exists).
      parameters:
      - description: Landing page ID
        in: path
        name: landingPageId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/api.LandingPageTranslatedLangsHTTPResponse'
        "400":
          description: invalid path
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "404":
          description: landing page not found
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: List translated locales for a landing page (admin)
      tags:
      - admin-landing-page
  /admin/landing-pages/{landingPageId}/translations/{lang}:
    put:
      consumes:
      - application/json
      description: Creates or updates campaign_landing_page_translations for the given
        landing page and language code.
      parameters:
      - description: Landing page ID
        in: path
        name: landingPageId
        required: true
        type: integer
      - description: BCP-47 or short language tag, e.g. ja, zh-CN
        in: path
        name: lang
        required: true
        type: string
      - description: Translated fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.PutLandingTranslationReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/api.PutLandingTranslationHTTPResponse'
        "400":
          description: validation error
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "404":
          description: landing page not found
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "500":
          description: internal error
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Upsert landing page translation (admin)
      tags:
      - admin-landing-page
  /admin/landing-pages/{landingPageId}/translations/generate:
    post:
      consumes:
      - application/json
      description: Returns LLM-translated title/description/terms for the given landing
        page. Does not persist.
      parameters:
      - description: Landing page ID
        in: path
        name: landingPageId
        required: true
        type: integer
      - description: Source/target languages and optional source copy (falls back
          to landing page fields when empty)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.GenerateLandingTranslationReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/api.GenerateLandingTranslationHTTPResponse'
        "400":
          description: validation or empty source
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "404":
          description: landing page not found
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "500":
          description: internal error
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: OpenAI not configured or database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Generate landing page translation preview (admin)
      tags:
      - admin-landing-page
  /ping:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: 'example: {\"message\":\"pong\"}'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ping
      tags:
      - health
  /web/account/summary:
    get:
      parameters:
      - description: Currency (default USDT)
        in: query
        name: currency
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Get account summary (user)
      tags:
      - user-account
  /web/account/transactions:
    get:
      parameters:
      - description: Transaction type RECHARGE or CAMPAIGN_REWARD
        in: query
        name: type
        type: string
      - description: Pagination cursor (transaction id)
        in: query
        name: cursor
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: List account transactions (user)
      tags:
      - user-account
  /web/campaigns:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: List available campaigns (user)
      tags:
      - user-campaign
  /web/campaigns/{campaignId}/join:
    post:
      consumes:
      - application/json
      parameters:
      - description: Campaign ID
        in: path
        name: campaignId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: success or business error code in body
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/data.StandardResponse'
        "503":
          description: database unavailable
          schema:
            $ref: '#/definitions/data.StandardResponse'
      summary: Join campaign (user)
      tags:
      - user-campaign
  /web/campaigns/{campaignId}/landing-page:
    get:
      parameters:
      - description: Campaign ID
        in: path
        name: campaignId
        required: true
        type: integer
      - description: Preferred language; falls back to default
        in: query
        name: lang
