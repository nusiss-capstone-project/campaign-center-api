name: quality scans

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  # Does not use secrets — always shows a job on PR/push. (Copied repos have no secrets until you add them in this repo’s Settings.)
  go-ci:
    name: Go test & compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
      - name: Test server
        working-directory: server
        run: go test ./...
      - name: Compile client and common
        run: |
          (cd client && go build ./...)
          (cd common && go build ./...)

  # Note: `secrets` is not allowed in job-level `if:` (invalid workflow). Use step-level `if:` instead.
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
      - name: Run tests with coverage
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        run: |
          cd server
          go test -coverprofile=coverage.out ./...
      - name: SonarQube Scan
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >-
            -Dsonar.projectKey=lianjin_campaign-center-api
            -Dsonar.sources=server/service
            -Dsonar.go.coverage.reportPaths=server/coverage.out
            -Dsonar.exclusions=**/mock/**
            -Dsonar.coverage.exclusions=**/mock/**

  snyk:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        if: ${{ secrets.SNYK_TOKEN != '' }}
        with:
          go-version: '1.25.9'
      - uses: actions/cache@v4
        if: ${{ secrets.SNYK_TOKEN != '' }}
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - name: Install Snyk CLI
        if: ${{ secrets.SNYK_TOKEN != '' }}
        run: npm install -g snyk
      - name: Snyk test
        if: ${{ secrets.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          mkdir -p sarif-reports
          find . -name "go.mod" -execdir sh -c 'snyk test --file=go.mod --severity-threshold=high --sarif-file-output=../sarif-reports/snyk-$(basename "$(pwd)").sarif' \;
      - name: Upload Snyk SARIF file
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-reports/snyk-server.sarif
      - name: Snyk monitor
        if: ${{ secrets.SNYK_TOKEN != '' }}
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: find . -name "go.mod" -execdir snyk monitor --file=go.mod \;
